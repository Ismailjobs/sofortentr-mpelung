# Kullanım: docker compose up --build
# Site (Host): http://localhost:3002 — API yalnızca Docker içi ağda (sofort-client → sofort-server:4000).
# API’yi host’tan da açmak istersen aşağıdaki ports satırlarının yorumunu kaldır; çakışırsa örn. "4001:4000" kullan.
name: sofort

services:
  sofort-server:
    container_name: sofort-server
    build:
      context: .
      dockerfile: server/Dockerfile
    # Host’ta 4000 meşgulse bu servis yine çalışır; tarayıcı zaten 3002 üzerinden Next proxy kullanır.
    # ports:
    #   - "4000:4000"
    environment:
      PORT: "4000"
      HOST: "0.0.0.0"
      CORS_ORIGIN: "http://localhost:3002,http://127.0.0.1:3002,http://localhost:3000,http://127.0.0.1:3000"
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false

  sofort-client:
    container_name: sofort-client
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Boş bırakılırsa tarayıcı /api/contact (Next proxy) kullanır — önerilen Compose kurulumu.
        NEXT_PUBLIC_CONTACT_API_URL: ${NEXT_PUBLIC_CONTACT_API_URL:-}
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      CONTACT_API_INTERNAL_URL: http://sofort-server:4000/api/contact
      NEXT_PUBLIC_CONTACT_API_URL: ${NEXT_PUBLIC_CONTACT_API_URL:-}
    depends_on:
      - sofort-server
