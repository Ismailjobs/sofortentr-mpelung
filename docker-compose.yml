# Kullanım: docker compose up --build
# Site (Host): http://localhost:3002 — Next proxy içeriden sofort-server:4000’e gider.
# API ayrıca host’ta http://localhost:3331 (→ konteyner 4000); CORS_ORIGIN’e yeni origin eklemen gerekebilir.
name: sofort

services:
  sofort-server:
    container_name: sofort-server
    build:
      context: .
      dockerfile: server/Dockerfile
    # Host:3331 → konteyner:4000 (API doğrudan erişim; site yine 3002 + Next proxy).
    ports:
      - "3331:4000"
    environment:
      PORT: "4000"
      HOST: "0.0.0.0"
      CORS_ORIGIN: "http://localhost:3002,http://127.0.0.1:3002,http://localhost:3000,http://127.0.0.1:3000"
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false

  sofort-client:
    container_name: sofort-client
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Boş bırakılırsa tarayıcı /api/contact (Next proxy) kullanır — önerilen Compose kurulumu.
        NEXT_PUBLIC_CONTACT_API_URL: ${NEXT_PUBLIC_CONTACT_API_URL:-}
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      CONTACT_API_INTERNAL_URL: http://sofort-server:4000/api/contact
      NEXT_PUBLIC_CONTACT_API_URL: ${NEXT_PUBLIC_CONTACT_API_URL:-}
    depends_on:
      - sofort-server
